name: Trigger auto deployment for coffee-codex-api

on:
  push:
    branches: [main]
    paths:
      - '**'
      - '.github/workflows/deploy-api.yml'

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.COFFEECODEXAPI_REGISTRY_USERNAME }}
          password: ${{ secrets.COFFEECODEXAPI_REGISTRY_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
            -t docker.io/helmikhaled/coffee-codex-api:${{ github.sha }} \
            -t docker.io/helmikhaled/coffee-codex-api:latest \
            .

      - name: Push Docker images
        run: |
          docker push docker.io/helmikhaled/coffee-codex-api:${{ github.sha }}
          docker push docker.io/helmikhaled/coffee-codex-api:latest

      - name: Deploy to Azure Container App
        run: |
          az containerapp update \
            --name coffee-codex-api \
            --resource-group coffee-codex-rg \
            --image docker.io/helmikhaled/coffee-codex-api:${{ github.sha }} \
            --set-env-vars \
              ConnectionStrings__PostgreSql="${{ secrets.COFFEECODEXAPI_POSTGRESQL_CONNECTION_STRING }}" \
              Auth0__Domain="${{ secrets.COFFEECODEXAPI_AUTH0_DOMAIN }}" \
              Auth0__Audience="${{ secrets.COFFEECODEXAPI_AUTH0_AUDIENCE }}" \
              Auth0__ClientId="${{ secrets.COFFEECODEXAPI_AUTH0_CLIENT_ID }}" \
              Auth0__ClientSecret="${{ secrets.COFFEECODEXAPI_AUTH0_CLIENT_SECRET }}"
