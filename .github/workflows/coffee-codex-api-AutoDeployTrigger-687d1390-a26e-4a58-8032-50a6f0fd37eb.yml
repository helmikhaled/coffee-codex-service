name: Trigger auto deployment for coffee-codex-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/coffee-codex-api-AutoDeployTrigger-687d1390-a26e-4a58-8032-50a6f0fd37eb.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.COFFEECODEXAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.COFFEECODEXAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.COFFEECODEXAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: docker.io
          registryUsername: ${{ secrets.COFFEECODEXAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.COFFEECODEXAPI_REGISTRY_PASSWORD }}
          containerAppName: coffee-codex-api
          resourceGroup: coffee-codex-rg
          imageToBuild: helmikhaled@gmail.com/coffee-codex-api:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


